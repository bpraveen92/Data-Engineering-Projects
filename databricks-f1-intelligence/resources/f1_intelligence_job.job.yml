resources:
  jobs:
    f1_intelligence_job:
      name: ${bundle.target} F1 Intelligence ETL

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
        - name: season
          default: "2024"
        - name: round
          default: "all"
        - name: mode
          default: "incremental"

      tasks:
        - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ../etl/01_bronze_ingestion.ipynb
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema:  "{{job.parameters.schema}}"
              season:  "{{job.parameters.season}}"
              mode:    "{{job.parameters.mode}}"
          environment_key: default

        - task_key: silver_transformation
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ../etl/02_silver_transformation.ipynb
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema:  "{{job.parameters.schema}}"
          environment_key: default

        - task_key: gold_aggregation
          depends_on:
            - task_key: silver_transformation
          notebook_task:
            notebook_path: ../etl/03_gold_aggregation.ipynb
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema:  "{{job.parameters.schema}}"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl
