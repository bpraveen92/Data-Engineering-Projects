bundle:
  name: f1-intelligence

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

resources:
  apps:
    f1_intelligence_app:
      name: "f1-intelligence-app"
      source_code_path: streamlit_app/

variables:
  catalog:
    description: Unity Catalog catalog name
    default: f1_intelligence
  schema:
    description: Schema name (environment-specific)
    default: f1_dev

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-7abede46-67a0.cloud.databricks.com
    variables:
      catalog: f1_intelligence
      schema: f1_dev

  prod:
    mode: production
    workspace:
      host: https://dbc-7abede46-67a0.cloud.databricks.com
      root_path: /Workspace/Users/pravbala30@protonmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: f1_intelligence
      schema: f1_prod
    permissions:
      - user_name: pravbala30@protonmail.com
        level: CAN_MANAGE
