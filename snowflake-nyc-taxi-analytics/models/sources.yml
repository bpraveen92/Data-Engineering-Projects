version: 2

sources:
  - name: raw
    database: NYC_TAXI
    schema: RAW
    description: >
      Raw landing zone for NYC TLC Yellow Taxi Trip Records.
      Data is loaded via scripts/load_to_snowflake.py using write_pandas.
      Each row represents one taxi trip as reported by the metering system.

    freshness:
      warn_after: { count: 12, period: hour }
      error_after: { count: 24, period: hour }
    loaded_at_field: _loaded_at

    tables:
      - name: yellow_tripdata
        description: >
          NYC TLC Yellow Taxi trip records.
          Source: https://www.nyc.gov/site/tlc/about/tlc-trip-record-data.page
          Each row = one trip.  Parquet files are published monthly by TLC.
        columns:
          - name: vendor_id
            description: >
              ID of the technology provider that sent the trip record.
              1 = Creative Mobile Technologies (CMT), 2 = VeriFone Inc.
          - name: pickup_datetime
            description: Date and time when the meter was engaged (trip started).
          - name: dropoff_datetime
            description: Date and time when the meter was disengaged (trip ended).
          - name: passenger_count
            description: Number of passengers. Driver-entered value — may be null or 0.
          - name: trip_distance
            description: Elapsed trip distance in miles reported by the taximeter.
          - name: rate_code_id
            description: >
              Final rate code in effect at end of trip.
              1=Standard rate, 2=JFK, 3=Newark, 4=Nassau/Westchester,
              5=Negotiated fare, 6=Group ride.
          - name: store_and_fwd_flag
            description: >
              Whether the trip record was held in vehicle memory before sending to
              the vendor (Y = yes, N = no).
          - name: pickup_location_id
            description: TLC Taxi Zone where the meter was engaged (FK → taxi_zones).
          - name: dropoff_location_id
            description: TLC Taxi Zone where the meter was disengaged (FK → taxi_zones).
          - name: payment_type
            description: >
              How the passenger paid (FK → payment_types).
              1=Credit card, 2=Cash, 3=No charge, 4=Dispute, 5=Unknown, 6=Voided.
          - name: fare_amount
            description: Metered rate computed by the taximeter based on time and distance.
          - name: extra
            description: Miscellaneous extras and surcharges (e.g. $0.50 rush hour, $1 overnight).
          - name: mta_tax
            description: $0.50 MTA tax automatically triggered based on metered rate in use.
          - name: tip_amount
            description: >
              Tip amount. Automatically populated for credit card tips; cash tips not included.
          - name: tolls_amount
            description: Total amount of all tolls paid in trip.
          - name: improvement_surcharge
            description: $0.30 improvement surcharge assessed on hailed trips at the flag drop.
          - name: total_amount
            description: Total amount charged to passengers (excludes cash tips).
          - name: congestion_surcharge
            description: >
              NYC congestion surcharge for trips that start, end, or pass through
              Manhattan south of 96th Street.
          - name: airport_fee
            description: $1.25 pickup fee at LaGuardia; $1.75 at JFK.
          - name: _loaded_at
            description: UTC timestamp when this row was loaded by scripts/load_to_snowflake.py.
          - name: _source_month
            description: YYYY-MM string identifying which monthly Parquet file this row came from.
