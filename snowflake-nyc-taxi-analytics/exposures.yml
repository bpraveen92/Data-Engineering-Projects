version: 2

exposures:
  - name: nyc_taxi_revenue_dashboard
    label: NYC Taxi Revenue Dashboard
    type: dashboard
    maturity: medium
    description: >
      BI dashboard showing monthly revenue trends, top-performing pickup zones,
      payment method distribution, and airport trip share.
      Powered by mart_revenue_by_zone and fct_trips.

    depends_on:
      - ref('mart_revenue_by_zone')
      - ref('fct_trips')

    owner:
      name: Data Engineering Team
      email: data@example.com

  - name: nyc_taxi_demand_heatmap
    label: NYC Taxi Demand Heatmap
    type: dashboard
    maturity: medium
    description: >
      Heatmap visualization showing trip demand by hour of day vs day of week.
      Used by operations teams to optimize driver scheduling and surge pricing windows.
      Powered by mart_hourly_demand.

    depends_on:
      - ref('mart_hourly_demand')

    owner:
      name: Data Engineering Team
      email: data@example.com

  - name: nyc_taxi_zone_analytics
    label: NYC Taxi Zone Analytics
    type: ml
    maturity: low
    description: >
      Feature store for zone-level trip patterns.
      Feeds a demand prediction model that uses historical zone demand,
      time of day, and weather as features.
      Consumes fct_trips and dim_taxi_zones.

    depends_on:
      - ref('fct_trips')
      - ref('dim_taxi_zones')

    owner:
      name: Data Science Team
      email: datascience@example.com
