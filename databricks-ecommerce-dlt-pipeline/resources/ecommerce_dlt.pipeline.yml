resources:
  pipelines:
    ecommerce_dlt_pipeline:
      name: ${bundle.target} Ecommerce DLT Pipeline

      catalog: ${var.catalog}
      target: ${var.schema}

      serverless: true

      configuration:
        pipeline.mode: ${var.pipeline_mode}
        ecommerce.data_root: /Workspace/Users/<your-databricks-email>/.bundle/ecommerce-dlt/dev/ecommerce_data

      libraries:
        - notebook:
            path: ../pipeline/01_bronze.py
        - notebook:
            path: ../pipeline/02_silver.py
        - notebook:
            path: ../pipeline/03_gold.py
