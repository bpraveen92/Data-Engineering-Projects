version: '3.8'

services:
  spark:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etl-project-2-spark
    environment:
      - SPARK_LOCAL_IP=127.0.0.1
      - SPARK_MASTER_HOST=spark
      - SPARK_MASTER_PORT=7077
      - PYTHONPATH=/opt/spark/src:/opt/spark/scripts
      # LocalStack credentials for Kinesis connector (AWS SDK uses these)
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=ap-south-1
      - KINESIS_ENDPOINT=http://etl-project-2-localstack:4566
      # S3A / MinIO credentials (read by spark_aggregator.py for S3A filesystem config)
      - S3_ENDPOINT=http://etl-project-2-minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
    volumes:
      - ./scripts:/opt/spark/scripts
      - ./src:/opt/spark/src
      - ./sample_data_initial_load:/opt/spark/sample_data_initial_load
    ports:
      - "4040:4040" # Spark UI
    networks:
      - etl-network

  minio:
    image: minio/minio:latest
    container_name: etl-project-2-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # MinIO API
      - "9001:9001" # MinIO Console
    volumes:
      - minio-storage:/minio_data
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etl-network

  localstack:
    image: localstack/localstack:latest
    container_name: etl-project-2-localstack
    environment:
      - SERVICES=kinesis,s3
      - DEBUG=0
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=ap-south-1
    ports:
      - "4566:4566" # LocalStack endpoint
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - etl-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4566/_localstack/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio-storage:


networks:
  etl-network:
    driver: bridge
